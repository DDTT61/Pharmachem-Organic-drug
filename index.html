<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Organic Drug Substances</title>
<style>
/* ── TOKENS ── */
:root {
  --bg:#0f1117; --s1:#1a1d27; --s2:#242736; --bd:#2e3248;
  --tx:#e8eaf6; --tx2:#8b92b8; --tx3:#4a5280;
  --ac:#6c8ef5; --ac2:#a78bfa;
  --gr:#4ade80; --rd:#f87171; --yw:#fbbf24;
  --card-shadow: 0 8px 32px rgba(0,0,0,.5);
  --radius:20px;
}
.light {
  --bg:#f0f2f8; --s1:#ffffff; --s2:#e8ecf5; --bd:#d0d6e8;
  --tx:#1a1d2e; --tx2:#5a6080; --tx3:#9aa0c0;
  --card-shadow: 0 8px 32px rgba(0,0,0,.12);
}

/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;
  transition:background .25s,color .25s;}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100%;height:100dvh;}

/* ── TOPBAR ── */
.top{
  background:var(--s1);border-bottom:1px solid var(--bd);
  padding:env(safe-area-inset-top,0) 12px 0;flex-shrink:0;
  transition:background .25s,border-color .25s;
}
.top-row{display:flex;align-items:center;gap:8px;padding:9px 0;flex-wrap:wrap;}
.app-label{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
.app-label b{font-size:14px;font-weight:800;color:var(--ac);}
.app-label span{font-size:9px;color:var(--tx2);letter-spacing:.3px;}

/* Mode toggle (Name→Struct / Struct→Name) */
.mode-switch{
  display:flex;background:var(--s2);border:1px solid var(--bd);
  border-radius:10px;padding:3px;gap:3px;flex-shrink:0;
  transition:background .25s;
}
.mode-btn{
  padding:5px 10px;border-radius:7px;border:none;
  background:transparent;color:var(--tx2);font-size:11px;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.mode-btn.on{background:var(--ac);color:#fff;}

/* Right controls */
.top-right{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;}
.icon-btn{
  width:32px;height:32px;border-radius:9px;border:1px solid var(--bd);
  background:transparent;color:var(--tx2);font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.icon-btn:active{background:var(--s2);}
.stat{font-size:11px;color:var(--tx2);white-space:nowrap;}
.stat b{color:var(--tx);}

/* Category filter */
.cat-row{padding:0 0 9px;display:flex;gap:6px;align-items:center;}
.cat-row select{
  flex:1;background:var(--s2);border:1px solid var(--bd);color:var(--tx);
  padding:6px 10px;border-radius:10px;font-size:12px;
  -webkit-appearance:none;appearance:none;cursor:pointer;
  transition:background .25s,color .25s;
}

/* ── PROGRESS ── */
.prog{height:2px;background:var(--s2);flex-shrink:0;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .3s;}

/* ── CONTENT ── */
.content{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:14px 12px 6px;gap:12px;overflow:hidden;
}

/* ── CARD ── */
.scene{
  perspective:1000px;width:100%;max-width:600px;
  flex:1;max-height:420px;cursor:pointer;
}
.card{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.card.flipped{transform:rotateY(180deg);}
.face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:var(--radius);border:1px solid var(--bd);overflow:hidden;
  transition:background .25s,border-color .25s;
}

/* Front face */
.front{
  background:var(--s1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;gap:10px;box-shadow:var(--card-shadow);
}
.front-meta{
  position:absolute;top:12px;left:0;right:0;
  display:flex;justify-content:space-between;padding:0 14px;
  font-size:10px;color:var(--tx2);
}
.cat-pill{
  background:rgba(108,142,245,.12);border:1px solid rgba(108,142,245,.2);
  border-radius:20px;padding:2px 9px;color:var(--ac);
  font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
  max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.front-icon{font-size:26px;opacity:.3;}
.front-text{
  font-size:clamp(16px,4vw,26px);font-weight:800;
  text-align:center;line-height:1.35;color:var(--tx);max-width:90%;
}
/* When front shows image */
.front-img{
  max-width:88%;max-height:68%;object-fit:contain;
  border-radius:4px;display:none;
}
.front.img-mode .front-icon{display:none;}
.front.img-mode .front-text{display:none;}
.front.img-mode .front-img{display:block;}
.tap-hint{position:absolute;bottom:12px;font-size:10px;color:var(--tx3);}

/* Back face */
.back{
  background:var(--s2);transform:rotateY(180deg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;gap:10px;box-shadow:var(--card-shadow);
}
.back-img{max-width:88%;max-height:55%;object-fit:contain;border-radius:4px;display:none;}
.back-spin{
  width:60px;height:60px;border-radius:50%;
  border:3px solid var(--bd);border-top-color:var(--ac);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.back-name{font-size:15px;font-weight:700;color:var(--tx);text-align:center;line-height:1.4;}
.back-cat{
  font-size:11px;color:var(--ac2);text-align:center;
  background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);
  border-radius:20px;padding:3px 12px;
}
/* When back shows name (struct→name mode) */
.back.name-mode .back-img{display:none!important;}
.back.name-mode .back-spin{display:none!important;}
.back-hint{position:absolute;bottom:12px;font-size:10px;color:var(--tx3);}

/* ── BUTTONS ── */
.btns{display:flex;gap:10px;align-items:center;width:100%;max-width:420px;}
.btn{
  flex:1;padding:13px 8px;border-radius:14px;border:none;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;
}
.btn:active{transform:scale(.94);}
.btn-no{background:var(--rd);color:#fff;}
.btn-yes{background:var(--gr);color:#0a1a0a;}
.btn-flip{
  flex:0 0 auto;width:52px;height:52px;border-radius:14px;
  background:var(--s2);color:var(--tx);border:1.5px solid var(--bd);font-size:18px;
  transition:background .25s;
}
.nav{display:flex;gap:8px;padding-bottom:env(safe-area-inset-bottom,8px);}
.btn-nav{
  background:transparent;border:1px solid var(--bd);color:var(--tx2);
  border-radius:10px;padding:7px 18px;font-size:12px;cursor:pointer;
  transition:background .25s,color .25s,border-color .25s;
}
.btn-nav:active{background:var(--s2);}

/* ── RESULT OVERLAY ── */
.result{
  display:none;position:absolute;inset:0;
  background:var(--bg);flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
  text-align:center;padding:32px;
  transition:background .25s;
}
.result.show{display:flex;}
.result h2{font-size:22px;font-weight:900;}
.ring{
  width:90px;height:90px;border-radius:50%;
  border:5px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:900;
}
.res-row{display:flex;gap:28px;}
.res-col{display:flex;flex-direction:column;align-items:center;gap:3px;}
.res-col .n{font-size:28px;font-weight:900;}
.res-col .l{font-size:10px;color:var(--tx2);}
.res-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.btn-res{
  padding:10px 22px;border-radius:12px;border:1px solid var(--bd);
  font-size:13px;font-weight:700;cursor:pointer;background:var(--s2);color:var(--tx);
  transition:background .25s;
}
.btn-res.red{background:var(--rd);color:#fff;border-color:var(--rd);}

/* light mode image invert */
body:not(.light) img.struct { filter:invert(1) hue-rotate(180deg); }
body.light img.struct { filter:none; }
</style>
</head>

// ── STATE ──
let deck = [...DRUGS];
let idx = 0, flipped = false;
let knowSet = new Set(), dunnoSet = new Set();
let mode = 'n2s';          // 'n2s' = name→struct,  's2n' = struct→name
let isLight = false;
let loadedChunks = new Set();
const HAS_CAT = true;

// ── THEME ──
function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
  document.getElementById('themeColor').content = isLight ? '#f0f2f8' : '#0f1117';
}

// ── MODE ──
function setMode(m) {
  mode = m;
  document.getElementById('modeN').classList.toggle('on', m === 'n2s');
  document.getElementById('modeS').classList.toggle('on', m === 's2n');
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

// ── IMAGE LOADING ──
function getImg(imgName) {
  return window.__C__ && window.__C__[imgName]
    ? 'data:image/png;base64,' + window.__C__[imgName] : null;
}
function loadChunk(ci) {
  if (loadedChunks.has(ci)) return Promise.resolve();
  loadedChunks.add(ci);
  return new Promise(res => {
    const s = document.createElement('script');
    s.src = CFILES[ci]; s.onload = res; s.onerror = res;
    document.head.appendChild(s);
  });
}
function preloadNext() {
  const next = deck[idx + 1];
  if (next) loadChunk(CMAP[next.image] ?? 0);
}

// ── RENDER ──
async function render() {
  // Hide result if showing
  const result = document.getElementById('result');
  
  if (idx >= deck.length) { showResult(); return; }

  const d = deck[idx];
  flipped = false;
  document.getElementById('card').classList.remove('flipped');

  // Update front
  const front = document.getElementById('front');
  const fHint = document.getElementById('fHint');

  if (mode === 'n2s') {
    // Front = name, Back = structure
    front.classList.remove('img-mode');
    document.getElementById('fText').textContent = d.name;
    fHint.textContent = '点击查看结构式 →';
    // Back: show spinner, load image
    document.getElementById('bImg').style.display = 'none';
    document.getElementById('bSpin').style.display = 'block';
    document.getElementById('bName').style.display = 'none';
    if (HAS_CAT) document.getElementById('bCat').style.display = 'none';
    // load image for back
    const ci = CMAP[d.image] ?? 0;
    await loadChunk(ci);
    const src = getImg(d.image);
    if (src) {
      document.getElementById('bImg').src = src;
      document.getElementById('bImg').style.display = 'block';
      document.getElementById('bSpin').style.display = 'none';
    }
    document.getElementById('bName').textContent = d.name;
    document.getElementById('bName').style.display = 'block';
    if (HAS_CAT && document.getElementById('bCat')) {
      document.getElementById('bCat').textContent = d.category;
      document.getElementById('bCat').style.display = 'block';
    }
  } else {
    // Front = structure image, Back = name
    front.classList.add('img-mode');
    fHint.textContent = '点击查看药名 →';
    document.getElementById('fImg').src = '';
    // load image for front
    const ci = CMAP[d.image] ?? 0;
    await loadChunk(ci);
    const src = getImg(d.image);
    if (src) document.getElementById('fImg').src = src;
    // Back: name only
    document.getElementById('bImg').style.display = 'none';
    document.getElementById('bSpin').style.display = 'none';
    document.getElementById('bName').textContent = d.name;
    document.getElementById('bName').style.display = 'block';
    if (HAS_CAT && document.getElementById('bCat')) {
      document.getElementById('bCat').textContent = d.category;
      document.getElementById('bCat').style.display = 'block';
    }
  }

  // Cat pill + number
  if (HAS_CAT) document.getElementById('fCat').textContent = d.category ?? '';
  document.getElementById('fNum').textContent = (idx+1) + '/' + deck.length;

  updateStats();
  preloadNext();
}

function updateStats() {
  const done = Math.min(idx, deck.length);
  document.getElementById('stP').textContent = done + '/' + deck.length;
  document.getElementById('stK').textContent = knowSet.size;
  document.getElementById('stD').textContent = dunnoSet.size;
  document.getElementById('pf').style.width = (deck.length > 0 ? done/deck.length*100 : 0) + '%';
}

// ── CONTROLS ──
function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
}

function rate(know) {
  const d = deck[idx];
  if (know) { knowSet.add(d.id); dunnoSet.delete(d.id); }
  else      { dunnoSet.add(d.id); knowSet.delete(d.id); }
  idx++;
  render();
  updateStats();
}

function go(dir) {
  if (dir === -1 && idx > 0) idx--;
  else if (dir === 1 && idx < deck.length) idx++;
  render();
}

function shuffle() {
  for (let i = deck.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]] = [deck[j],deck[i]];
  }
  idx = 0; render();
}

function filterCat() {
  const cat = document.getElementById('catSel')?.value ?? 'all';
  deck = cat === 'all' ? [...DRUGS] : DRUGS.filter(d => d.category === cat);
  knowSet.clear(); dunnoSet.clear(); idx = 0; render();
}

// ── RESULT ──
function showResult() {
  const total = deck.length, know = knowSet.size, dunno = dunnoSet.size;
  const pct = total > 0 ? Math.round(know/total*100) : 0;
  document.getElementById('rPct').textContent = pct + '%';
  document.getElementById('rK').textContent = know;
  document.getElementById('rD').textContent = dunno;
  document.getElementById('rT').textContent = total;
  const ring = document.getElementById('rRing');
  ring.style.borderColor = pct>=80?'var(--gr)':pct>=50?'var(--yw)':'var(--rd)';
  document.getElementById('result').classList.add('show');
}

function closeResult() {
  document.getElementById('result').classList.remove('show');
  // Loop back to start without resetting scores
  idx = 0;
  render();
}

function restart(dunnoOnly) {
  if (dunnoOnly && dunnoSet.size > 0) {
    const ids = [...dunnoSet];
    deck = deck.filter(d => ids.includes(d.id));
  }
  knowSet.clear(); dunnoSet.clear(); idx = 0;
  document.getElementById('result').classList.remove('show');
  render();
}

// ── SWIPE ──
let tx0=0,ty0=0;
const scene = document.querySelector('.scene');
scene.addEventListener('touchstart', e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
scene.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx0, dy=Math.abs(e.changedTouches[0].clientY-ty0);
  if(Math.abs(dx)>60&&dy<40){ dx<0?rate(true):rate(false); }
},{passive:true});

render();
